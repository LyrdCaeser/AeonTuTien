name: build-apk

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  PNPM_HOME: /home/runner/.local/share/pnpm

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.5"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.15.1 --activate
          echo "$PNPM_HOME" >> "$GITHUB_PATH"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Show tool versions
        run: |
          node -v
          corepack --version
          pnpm -v
          java -version
          sdkmanager --version

      - name: Install web dependencies with pnpm
        run: |
          rm -rf node_modules
          pnpm install --no-frozen-lockfile

      - name: Build web game
        run: pnpm run build

      - name: Install Cordova locally
        run: |
          pnpm add -D cordova@13.0.0 cordova-android@14.0.1

      - name: Prepare Cordova Android project
        run: |
          rm -rf www platforms plugins
          mkdir -p www
          cp -R dist/. www/

          if [ ! -f config.xml ]; then
            cat > config.xml <<'XML'
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.aeontutien.game" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
            <name>Aeon Tu Tien</name>
            <description>Web RPG built with React, Vite and Phaser.</description>
            <author email="trinhvu24689@gmail.com">AI The Ky 22</author>
            <content src="index.html" />
            <access origin="*" />
            <allow-navigation href="*" />
            <allow-intent href="http://*/*" />
            <allow-intent href="https://*/*" />
            <allow-intent href="tel:*" />
            <allow-intent href="sms:*" />
            <allow-intent href="mailto:*" />
            <allow-intent href="geo:*" />
            <preference name="android-minSdkVersion" value="24" />
            <preference name="android-targetSdkVersion" value="35" />
            <preference name="android-compileSdkVersion" value="35" />
            <preference name="android-buildToolsVersion" value="35.0.0" />
            <preference name="Fullscreen" value="true" />
            <preference name="Orientation" value="landscape" />
          </widget>
          XML
          fi

          CORDOVA_ANDROID_PACKAGE_JSON="$(node -p "require.resolve('cordova-android/package.json')")"
          CORDOVA_ANDROID_DIR="$(dirname "$CORDOVA_ANDROID_PACKAGE_JSON")"
          pnpm exec cordova platform add "$CORDOVA_ANDROID_DIR" --no-save

      - name: Build debug APK
        run: pnpm exec cordova build android --debug

      - name: Collect APK
        run: |
          mkdir -p apk-output
          find platforms/android/app/build/outputs/apk -type f -name "*.apk" -exec cp {} apk-output/ \;
          ls -lah apk-output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aeon Tu Tiên
          path: apk-output/*.apk
          if-no-files-found: error
