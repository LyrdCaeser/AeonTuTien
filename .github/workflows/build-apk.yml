name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install Cordova locally
        run: |
          npm install
          npm install cordova@latest

      - name: Prepare Cordova Android project
        run: |
          rm -rf platforms/android plugins
          npx cordova platform add android

      - name: Build debug APK
        run: npx cordova build android --debug -- --packageType=apk

      - name: Collect APK
        run: |
          mkdir -p artifact
          find platforms/android/app/build/outputs -name "*.apk" -print -exec cp {} artifact/ \;
          ls -lh artifact

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aeon Tu Tiên
          path: artifact/*.apk
          if-no-files-found: error
