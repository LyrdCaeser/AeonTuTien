name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    env:
      CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.7-all.zip

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix npm registry and clean project
        run: |
          npm config delete proxy || true
          npm config delete https-proxy || true
          npm config set registry https://registry.npmjs.org/
          rm -f .npmrc package-lock.json npm-shrinkwrap.json
          rm -rf node_modules platforms plugins
          npm cache clean --force
          npm config get registry
          gradle --version

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install Cordova globally
        run: |
          npm install -g cordova@12.0.0 --registry=https://registry.npmjs.org/
          cordova --version

      - name: Prepare Cordova Android project
        run: |
          cordova telemetry off
          cordova platform add android@12.0.1 --verbose

      - name: Patch Cordova Gradle for XML parser
        run: |
          sed -i '1i import groovy.xml.XmlParser' platforms/android/CordovaLib/cordova.gradle || true

      - name: Build debug APK
        run: cordova build android --debug -- --packageType=apk

      - name: Collect APK
        run: |
          mkdir -p artifact
          find platforms/android/app/build/outputs -name "*.apk" -print -exec cp {} artifact/ \;
          ls -lh artifact

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aeon Tu Tiên
          path: artifact/*.apk
          if-no-files-found: error
