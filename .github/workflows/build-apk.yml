name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    env:
      CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.7-all.zip

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix npm registry and clean project
        run: |
          npm config delete proxy || true
          npm config delete https-proxy || true
          npm config set registry https://registry.npmjs.org/
          rm -f .npmrc package-lock.json npm-shrinkwrap.json
          rm -rf node_modules platforms plugins
          npm cache clean --force
          npm config get registry
          gradle --version

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Force config.xml to SDK 33
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'config.xml';
          let s = fs.readFileSync(file, 'utf8');

          function setPref(name, value) {
            const re = new RegExp(`<preference\\s+name=["']${name}["']\\s+value=["'][^"']*["']\\s*/>`, 'i');
            const line = `    <preference name="${name}" value="${value}" />`;
            if (re.test(s)) {
              s = s.replace(re, line.trim());
            } else {
              s = s.replace('</widget>', `${line}\n</widget>`);
            }
          }

          setPref('android-minSdkVersion', '23');
          setPref('android-targetSdkVersion', '33');
          setPref('android-compileSdkVersion', '33');
          setPref('android-buildToolsVersion', '33.0.2');

          fs.writeFileSync(file, s);
          NODE

      - name: Install Cordova globally
        run: |
          npm install -g cordova@12.0.0 --registry=https://registry.npmjs.org/
          cordova --version

      - name: Prepare Cordova Android project
        run: |
          cordova telemetry off
          cordova platform add android@12.0.1 --verbose
          cordova prepare android

      - name: Patch Cordova Gradle and force AEON launcher icon
        run: |
          sed -i '1i import groovy.xml.XmlParser' platforms/android/CordovaLib/cordova.gradle || true
          echo "cdvCompileSdkVersion=33" >> platforms/android/gradle.properties
          echo "cdvTargetSdkVersion=33" >> platforms/android/gradle.properties
          echo "cdvBuildToolsVersion=33.0.2" >> platforms/android/gradle.properties

          if [ ! -d "cordova-icons" ]; then
            echo "Missing cordova-icons folder. Upload the icon patch folder to the repository root."
            exit 1
          fi

          mkdir -p platforms/android/app/src/main/res/mipmap-ldpi
          mkdir -p platforms/android/app/src/main/res/mipmap-mdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-hdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xhdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xxhdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xxxhdpi

          cp cordova-icons/mipmap-ldpi/icon.png platforms/android/app/src/main/res/mipmap-ldpi/icon.png
          cp cordova-icons/mipmap-mdpi/icon.png platforms/android/app/src/main/res/mipmap-mdpi/icon.png
          cp cordova-icons/mipmap-hdpi/icon.png platforms/android/app/src/main/res/mipmap-hdpi/icon.png
          cp cordova-icons/mipmap-xhdpi/icon.png platforms/android/app/src/main/res/mipmap-xhdpi/icon.png
          cp cordova-icons/mipmap-xxhdpi/icon.png platforms/android/app/src/main/res/mipmap-xxhdpi/icon.png
          cp cordova-icons/mipmap-xxxhdpi/icon.png platforms/android/app/src/main/res/mipmap-xxxhdpi/icon.png

          for d in platforms/android/app/src/main/res/mipmap-*dpi; do
            cp "$d/icon.png" "$d/ic_launcher.png"
            cp "$d/icon.png" "$d/ic_launcher_round.png"
            cp "$d/icon.png" "$d/ic_launcher_foreground.png"
          done

          node <<'NODE'
          const fs = require('fs');
          const file = 'platforms/android/app/src/main/AndroidManifest.xml';
          let s = fs.readFileSync(file, 'utf8');

          if (/android:icon=/.test(s)) {
            s = s.replace(/android:icon="@[^"]*"/, 'android:icon="@mipmap/icon"');
          } else {
            s = s.replace(/<application\b/, '<application android:icon="@mipmap/icon"');
          }

          if (/android:roundIcon=/.test(s)) {
            s = s.replace(/android:roundIcon="@[^"]*"/, 'android:roundIcon="@mipmap/icon"');
          } else {
            s = s.replace(/<application\b/, '<application android:roundIcon="@mipmap/icon"');
          }

          fs.writeFileSync(file, s);
          console.log(s.match(/<application[^>]+>/)?.[0] || 'manifest patched');
          NODE

      - name: Build debug APK
        run: |
          cordova compile android --debug -- --packageType=apk --gradleArg=-PcdvCompileSdkVersion=33 --gradleArg=-PcdvTargetSdkVersion=33 --gradleArg=-PcdvBuildToolsVersion=33.0.2

      - name: Collect APK
        run: |
          mkdir -p artifact
          find platforms/android/app/build/outputs -name "*.apk" -print -exec cp {} artifact/ \;
          ls -lh artifact

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aeon - Tu Tiên
          path: artifact/*.apk
          if-no-files-found: error
